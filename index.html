<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadiPay Global - Matrix</title>
    <style>
        /* الخلفية العامة للموقع - الطراز السيبراني الفاخر */
        body {
            background-color: #0d0d11; /* قريب من الأسود الفحمي */
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #0d0d11 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية الزجاج الذكية - Glassmorphism */
        .vortex-glass-card {
            background: rgba(24, 24, 27, 0.8); /* Charcoal Gray شفاف */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 102, 0, 0.3); /* إطار برتقالي نيوني خفيف */
            border-radius: 20px;
            padding: 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            direction: rtl;
            transition: all 0.3s ease;
        }

        /* مبدل اللغات */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 102, 0, 0.4);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .lang-btn.active, .lang-btn:hover {
            background: #ff6600; /* برتقالي نيوني */
            border-color: #ff6600;
            box-shadow: 0 0 12px rgba(255, 102, 0, 0.6);
        }

        /* الترويسة والمؤشر الحي */
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .card-header h3 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }
        .card-subtitle {
            color: #a1a1aa;
            font-size: 0.95rem;
            margin-top: -15px;
            margin-bottom: 25px;
        }
        .blink {
            width: 12px;
            height: 12px;
            background-color: #00ff87; /* أخضر زمردي نشط */
            border-radius: 50%;
            animation: vortexPulse 2s infinite;
        }

        /* عناصر الإدخال والقوائم */
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #e4e4e7;
            font-size: 0.9rem;
            font-weight: 500;
        }
        select, input {
            background: rgba(10, 10, 12, 0.9);
            border: 1px solid rgba(255, 102, 0, 0.4);
            color: #ffffff;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            border-color: #00ff87; /* يتحول للأخضر عند التفاعل */
        }
        .input-grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* شبكة عرض النتائج والرسوم */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 25px;
        }
        .result-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .label { color: #d4d4d8; font-size: 0.95rem; }
        .value { font-weight: bold; font-size: 1.05rem; }
        
        /* الألوان التنافسية للشبكة */
        .neon-orange { color: #ff6600; text-shadow: 0 0 8px rgba(255, 102, 0, 0.3); }
        .emerald { color: #00ff87; text-shadow: 0 0 8px rgba(0, 255, 135, 0.3); }
        .high { color: #ef4444; text-decoration: line-through; opacity: 0.8; }

        /* سجل تشفير الحماية والـ Logs */
        .crypto-log h4 {
            margin: 20px 0 10px 0;
            color: #ff6600;
            font-size: 1rem;
        }
        .crypto-log pre {
            background: #050507;
            border-right: 4px solid #ff6600;
            padding: 15px;
            color: #00ff87;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            border-radius: 8px;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* الأنميشن الخاص بالمؤشر الزمردي */
        @keyframes vortexPulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 135, 0.5); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 10px rgba(0, 255, 135, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 135, 0); }
        }
    </style>
</head>
<body>

<div class="vortex-glass-card" id="mainCard">
    <div class="lang-switcher">
        <button onclick="switchLang('ar')" id="btnAr" class="lang-btn active">العربية</button>
        <button onclick="switchLang('en')" id="btnEn" class="lang-btn">English</button>
    </div>

    <div class="card-header">
        <span class="status-dot blink"></span>
        <h3 id="txtTitle">مصفوفة الشفافية وتكامل الخدمات</h3>
    </div>
    <p class="card-subtitle" id="txtSubtitle">دمج المتاجر العالمية والخدمات المحلية مع التوجيه المتعدد للعملات</p>
    
    <div class="simulation-box">
        <div class="input-group">
            <label id="lblService">نوع الخدمة المدمجة:</label>
            <select id="serviceType" onchange="runAdvancedVortex()">
                <option value="ecommerce" id="optEcom">متجر إلكتروني عالمي (API Integration)</option>
                <option value="local" id="optLocal">خدمات وتجارة محلية (Local Retail)</option>
                <option value="global" id="optGlobal">تحويل دولي عبر الحدود (Cross-Border)</option>
            </select>
        </div>

        <div class="input-grid-two">
            <div class="input-sub">
                <label id="lblAmount">المبلغ:</label>
                <input type="number" id="vortexAmount" value="100" min="1" oninput="runAdvancedVortex()">
            </div>
            <div class="input-sub">
                <label id="lblCurrency">العملة النقدية/الرقمية:</label>
                <select id="vortexCurrency" onchange="runAdvancedVortex()">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="DZD">DZD (د.ج)</option>
                    <option value="USDT">USDT (Crypto)</option>
                </select>
            </div>
        </div>
        
        <div class="results-grid">
            <div class="result-item">
                <span class="label" id="lblLegacy">الرسوم التقليدية الاحتكارية:</span>
                <span class="value high" id="advLegacyFee">0.00</span>
            </div>
            <div class="result-item">
                <span class="label" id="lblMadiPay">رسوم بروتوكول MadiPay العادلة:</span>
                <span class="value emerald" id="advMadiPayFee">0.00</span>
            </div>
            <div class="result-item">
                <span class="label" id="lblStatus">قناة التوجيه النشطة:</span>
                <span class="value neon-orange" id="advRoutingStatus">Ready</span>
            </div>
        </div>

        <div class="crypto-log">
            <h4 id="lblLogTitle">سجل محرك التوجيه والسيولة الحية:</h4>
            <pre id="advCryptoConsole">Initializing Unified Ledger System...</pre>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: {
            title: "مصفوفة الشفافية وتكامل الخدمات",
            subtitle: "دمج المتاجر العالمية والخدمات المحلية مع التوجيه المتعدد للعملات",
            service: "نوع الخدمة المدمجة:",
            ecom: "متجر إلكتروني عالمي (API Integration)",
            local: "خدمات وتجارة محلية (Local Retail)",
            global: "تحويل دولي عبر الحدود (Cross-Border)",
            amount: "المبلغ:",
            currency: "العملة النقدية/الرقمية:",
            legacy: "الرسوم التقليدية الاحتكارية:",
            madipay: "رسوم بروتوكول MadiPay العادلة:",
            status: "قناة التوجيه النشطة:",
            logTitle: "سجل محرك التوجيه والسيولة الحية:",
            saved: "وفّرت"
        },
        en: {
            title: "Transparency Matrix & Service Integration",
            subtitle: "Global Merchants & Local Services Integrated with Multi-Currency Routing",
            service: "Integrated Service Type:",
            ecom: "Global E-Commerce (API Integration)",
            local: "Local Retail & Services",
            global: "Cross-Border International Transfer",
            amount: "Amount:",
            currency: "Sovereign/Digital Currency:",
            legacy: "Monopoly Traditional Fees:",
            madipay: "Fair MadiPay Protocol Fees:",
            status: "Active Routing Channel:",
            logTitle: "Core Routing & Live Liquidity Logs:",
            saved: "Saved"
        }
    };

    let currentLang = 'ar';

    function switchLang(lang) {
        currentLang = lang;
        
        document.getElementById('btnAr').classList.remove('active');
        document.getElementById('btnEn').classList.remove('active');
        if(lang === 'ar') document.getElementById('btnAr').classList.add('active');
        else document.getElementById('btnEn').classList.add('active');
        
        const card = document.getElementById('mainCard');
        if(lang === 'en') {
            card.style.direction = 'ltr';
            card.style.textAlign = 'left';
            card.style.borderRight = "none";
            document.getElementById('advCryptoConsole').style.borderRight = "none";
            document.getElementById('advCryptoConsole').style.borderLeft = "4px solid #ff6600";
        } else {
            card.style.direction = 'rtl';
            card.style.textAlign = 'right';
            document.getElementById('advCryptoConsole').style.borderLeft = "none";
            document.getElementById('advCryptoConsole').style.borderRight = "4px solid #ff6600";
        }

        document.getElementById('txtTitle').innerText = translations[lang].title;
        document.getElementById('txtSubtitle').innerText = translations[lang].subtitle;
        document.getElementById('lblService').innerText = translations[lang].service;
        document.getElementById('optEcom').innerText = translations[lang].ecom;
        document.getElementById('optLocal').innerText = translations[lang].local;
        document.getElementById('optGlobal').innerText = translations[lang].global;
        document.getElementById('lblAmount').innerText = translations[lang].amount;
        document.getElementById('lblCurrency').innerText = translations[lang].currency;
        document.getElementById('lblLegacy').innerText = translations[lang].legacy;
        document.getElementById('lblMadiPay').innerText = translations[lang].madipay;
        document.getElementById('lblStatus').innerText = translations[lang].status;
        document.getElementById('lblLogTitle').innerText = translations[lang].logTitle;

        runAdvancedVortex();
    }

    function runAdvancedVortex() {
        const amount = parseFloat(document.getElementById('vortexAmount').value);
        const currency = document.getElementById('vortexCurrency').value;
        const service = document.getElementById('serviceType').value;
        
        if (isNaN(amount) || amount <= 0) return;

        let legacyRate = 0.05, legacyFixed = 3.5;
        let madiPayRate = 0.001; // عمولة عادلة جداً 0.1%

        if (service === 'ecommerce') { legacyRate = 0.07; legacyFixed = 4.0; }
        else if (service === 'local') { legacyRate = 0.03; legacyFixed = 1.0; }

        const legacyFee = (amount * legacyRate) + legacyFixed;
        const madiPayFee = amount * madiPayRate;
        const saved = legacyFee - madiPayFee;

        document.getElementById('advLegacyFee').innerText = `${legacyFee.toFixed(2)} ${currency}`;
        document.getElementById('advMadiPayFee').innerText = `${madiPayFee.toFixed(2)} ${currency} (${translations[currentLang].saved} ${saved.toFixed(2)} ${currency})`;
        
        const channelName = currency === 'USDT' ? 'VORTEX Crypto-Bridge' : 'Unified Sovereign Rails';
        document.getElementById('advRoutingStatus').innerText = `${channelName}`;

        const timestamp = new Date().toISOString();
        document.getElementById('advCryptoConsole').innerHTML = 
`[${timestamp}] 📡 API Gateway: Connection established with [${service.toUpperCase()}] stream.
[INFO] Currency Detected: ${currency} | Operational Volume: ${amount}.
[ROUTING] Optimizing liquidity paths to bypass high-friction global gateways.
[SECURITY] CyberShield Integrity Checked. Anti-tamper shields at 100%.
[SUCCESS] Multi-Currency payload writing safely to local Encrypted Storage.`;
    }

    document.addEventListener("DOMContentLoaded", () => { runAdvancedVortex(); });
</script>

</body>
</html>
