<div class="vortex-glass-card" id="mainCard">
    <div class="lang-switcher">
        <button onclick="switchLang('ar')" class="lang-btn active">العربية</button>
        <button onclick="switchLang('en')" class="lang-btn">English</button>
    </div>

    <div class="card-header">
        <span class="status-dot blink"></span>
        <h3 id="txtTitle">مصفوفة الشفافية وتكامل الخدمات</h3>
    </div>
    <p class="card-subtitle" id="txtSubtitle">دمج المتاجر العالمية والخدمات المحلية مع التوجيه المتعدد للعملات</p>
    
    <div class="simulation-box">
        <div class="input-group">
            <label id="lblService">نوع الخدمة المدمجة:</label>
            <select id="serviceType" onchange="runAdvancedVortex()">
                <option value="ecommerce" id="optEcom">متجر إلكتروني عالمي (API Integration)</option>
                <option value="local" id="optLocal">خدمات وتجارة محلية (Local Retail)</option>
                <option value="global" id="optGlobal">تحويل دولي عبر الحدود (Cross-Border)</option>
            </select>
        </div>

        <div class="input-grid-two">
            <div class="input-sub">
                <label id="lblAmount">المبلغ:</label>
                <input type="number" id="vortexAmount" value="100" min="1" oninput="runAdvancedVortex()">
            </div>
            <div class="input-sub">
                <label id="lblCurrency">العملة النقدية/الرقمية:</label>
                <select id="vortexCurrency" onchange="runAdvancedVortex()">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="DZD">DZD (د.ج)</option>
                    <option value="USDT">USDT (Crypto)</option>
                </select>
            </div>
        </div>
        
        <div class="results-grid">
            <div class="result-item">
                <span class="label" id="lblLegacy">الرسوم التقليدية الاحتكارية:</span>
                <span class="value high" id="advLegacyFee">$0.00</span>
            </div>
            <div class="result-item text-emerald">
                <span class="label" id="lblMadiPay">رسوم بروتوكول MadiPay العادلة:</span>
                <span class="value emerald" id="advMadiPayFee">$0.00</span>
            </div>
            <div class="result-item">
                <span class="label" id="lblStatus">قناة التوجيه النشطة:</span>
                <span class="value neon-orange" id="advRoutingStatus">Ready</span>
            </div>
        </div>

        <div class="crypto-log">
            <h4 id="lblLogTitle">سجل محرك التوجيه والسيولة الحية:</h4>
            <pre id="advCryptoConsole">Initializing Unified Ledger System...</pre>
        </div>
    </div>
</div>
