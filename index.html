<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadiPay-Global | الموجه الذكي للتدفقات النقدية</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --charcoal: #1a1a1a;
            --neon-orange: #ff5500;
            --neon-orange-glow: rgba(255, 85, 0, 0.4);
            --text-light: #f5f5f5;
            --glass-bg: rgba(26, 26, 26, 0.65);
            --glass-border: rgba(255, 85, 0, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* خلفية ديناميكية متحركة */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-orange);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.15;
            top: 20%;
            left: 20%;
            z-index: 1;
        }

        /* حاوية التصميم الزجاجي */
        .container {
            position: relative;
            z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* ضبط الشعار برمجياً لسرعة التحميل */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            width: 120px;
            height: auto;
            /* خاصية تحسين الأداء للصور المتجهة أو الويب */
            image-rendering: -webkit-optimize-contrast; 
            filter: drop-shadow(0 0 15px var(--neon-orange-glow));
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--neon-orange);
        }

        p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* زر الإجراء الرئيسي */
        .btn-primary {
            background: var(--neon-orange);
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px var(--neon-orange-glow);
            transition: all 0.3s ease;
        }

        <img src="./logo.png" alt="MadiPay Global Logo" loading="lazy" width="120" height="120">

            background: #e04b00;
            box-shadow: 0 6px 20px rgba(255, 85, 0, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo-container">
            <img src="logo.webp" alt="MadiPay Global Logo" loading="lazy" width="120" height="120">
        </div>

        <h1>MadiPay<span>-Global</span></h1>
        <p>الموجه الذكي للتدفقات النقدية (Smart Router). حلول مالية عالمية، آمنة، وفائقة السرعة.</p>
        
        <button class="btn-primary">دخول المنصة الآمنة</button>
    </div>

</body>
</html>
