<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadiPay Global - Live Transparency Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات المصنع وتوحيد الرؤية البصرية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0d0d11; /* الفحم الداكن المعتم */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 102, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 135, 0.05) 0%, transparent 40%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* حاوية الماتريكس الزجاجية الفاخرة - Glassmorphism */
        .vortex-glass-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 102, 0, 0.25);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 680px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* مفاتيح اللغات بأعلى البطاقة */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 25px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 102, 0, 0.3);
            color: #a1a1aa;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .lang-btn.active, .lang-btn:hover {
            background: #ff6600;
            border-color: #ff6600;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.5);
        }

        /* الهيدر والمؤشر الحي النبضي */
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
        }

        .card-header h3 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to left, #ffffff, #d4d4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blink {
            width: 14px;
            height: 14px;
            background-color: #00ff87; /* أخضر زمردي */
            border-radius: 50%;
            animation: vortexPulse 2s infinite;
        }

        .card-subtitle {
            color: #71717a;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* الحقول والقوائم المنسدلة السيبرانية */
        .input-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #e4e4e7;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        select, input {
            background: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: #ff6600;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }

        .input-grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* شبكة عرض الرسوم ومقارنة العدالة المالية */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label {
            color: #a1a1aa;
            font-size: 0.95rem;
        }

        .value {
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* الألوان التنافسية للهوية مادي باي */
        .neon-orange { color: #ff6600; }
        .emerald { color: #00ff87; }
        .high { color: #ef4444; text-decoration: line-through; opacity: 0.7; }

        /* سجل شاشة الكونسول والأكواد المتدفقة حياً */
        .crypto-log h4 {
            margin-bottom: 12px;
            color: #ff6600;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .crypto-log pre {
            background: #040406;
            border-right: 4px solid #ff6600;
            padding: 16px;
            color: #00ff87;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            overflow-x: auto;
            border-radius: 12px;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
        }

        /* الأنميشن الخاص بنبض الشبكة الحية */
        @keyframes vortexPulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 135, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(0, 255, 135, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 135, 0); }
        }
    </style>
</head>
<body>

<div class="vortex-glass-card" id="mainCard">
    <div class="lang-switcher">
        <button onclick="switchLang('ar')" id="btnAr" class="lang-btn active">العربية</button>
        <button onclick="switchLang('en')" id="btnEn" class="lang-btn">English</button>
    </div>

    <div class="card-header">
        <span class="status-dot blink"></span>
        <h3 id="txtTitle">مصفوفة الشفافية وتكامل الخدمات</h3>
    </div>
    <p class="card-subtitle" id="txtSubtitle">دمج المتاجر العالمية والخدمات المحلية مع التوجيه المتعدد للعملات</p>
    
    <div class="simulation-box">
        <div class="input-group">
            <label id="lblService">نوع الخدمة المدمجة:</label>
            <select id="serviceType" onchange="runAdvancedVortex()">
                <option value="ecommerce" id="optEcom">متجر إلكتروني عالمي (API Integration)</option>
                <option value="local" id="optLocal">خدمات وتجارة محلية (Local Retail)</option>
                <option value="global" id="optGlobal">تحويل دولي عبر الحدود (Cross-Border)</option>
            </select>
