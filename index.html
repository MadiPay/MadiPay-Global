<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مادي باي العالمية - الموجه الذكي</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="smart-router-card">
        <div class="header">
            <h1>MadiPay Global</h1>
            <span>Smart Routing System v1.0</span>
        </div>

        <div class="input-group">
            <label for="amountInput">المبلغ المراد تحويله</label>
            <input type="number" id="amountInput" class="input-field" placeholder="أدخل المبلغ هنا..." value="100">
        </div>

        <div class="row">
            <div class="input-group">
                <label for="currencySelect">العملة الأجنبية</label>
                <select id="currencySelect" class="select-field">
                    <option value="EUR">يورو (EUR)</option>
                    <option value="USD">دولار (USD)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="rateTypeSelect">سعر الصرف المستهدف</label>
                <select id="rateTypeSelect" class="select-field">
                    <option value="parallel">السوق الموازية (السكوار)</option>
                    <option value="official">السعر البنكي الرسمي</option>
                </select>
            </div>
        </div>

        <button class="btn-route" onclick="calculateExchange()">تفعيل التوجيه الذكي</button>

        <div class="results-panel">
            <div class="result-item">
                <span class="result-label">سعر الصرف المعتمد:</span>
                <span class="result-value" id="exchangeRateDisplay">- -</span>
            </div>
            <div class="result-item">
                <span class="result-label">رسوم التوجيه والسيولة (1.5%):</span>
                <span class="result-value" id="feeDisplay">- -</span>
            </div>
            <div class="result-item">
                <span class="result-label">المقابل الإجمالي بالدينار:</span>
                <span class="result-value final-amount" id="finalResultDisplay">- -</span>
            </div>
        </div>

        <div class="escrow-panel">
            <div class="escrow-title">🛡️ نظام الضمان المالي (Escrow Protocol)</div>
            <div class="result-item">
                <span class="result-label">حالة المعاملة:</span>
                <span class="result-value" id="escrowStatus" style="color: #FFBB00;">في انتظار تفعيل العملية</span>
            </div>
            <button id="escrowBtn" class="btn-route btn-escrow" onclick="triggerEscrow()">
                تأمين المبلغ في الحساب الوسيط
            </button>
        </div>
    </div>

    <script>
        // قاعدة بيانات أسعار الصرف الثابتة (الرسمية والسكوار)
        const exchangeRates = {
            USD: { official: 134.50, parallel: 220.00 },
            EUR: { official: 145.20, parallel: 242.00 }
        };
        const platformFeePercent = 1.5;

        function calculateExchange() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const currency = document.getElementById('currencySelect').value;
            const rateType = document.getElementById('rateTypeSelect').value;

            if (isNaN(amount) || amount <= 0) {
                alert("يرجى إدخال مبلغ صحيح أكبر من الصفر.");
                return;
            }

            const rate = exchangeRates[currency][rateType];
            const grossTotal = amount * rate;
            const fee = grossTotal * (platformFeePercent / 100);
            const finalTotal = grossTotal + fee; 

            // تحديث البيانات على الواجهة
            document.getElementById('exchangeRateDisplay').innerText = `${rate.toFixed(2)} دج`;
            document.getElementById('feeDisplay').innerText = `${fee.toFixed(2)} دج`;
            document.getElementById('finalResultDisplay').innerText = `${finalTotal.toFixed(2)} دج`;

            // تفعيل أزرار وحالة نظام الضمان المالي
            document.getElementById('escrowBtn').style.display = 'block';
            document.getElementById('escrowStatus').innerText = 'جاهز للتأمين الحركي';
            document.getElementById('escrowStatus').style.color = '#FFBB00';
        }

        function triggerEscrow() {
            document.getElementById('escrowStatus').innerText = 'تم حجز السيولة بأمان في الحساب الوسيط 🔒';
            document.getElementById('escrowStatus').style.color = '#10B981';
            document.getElementById('escrowBtn').style.display = 'none';
        }

        // الحساب التلقائي فور تشغيل الصفحة لإعطاء مظهر حيوي
        window.onload = calculateExchange;
    </script>

</body>
</html>
