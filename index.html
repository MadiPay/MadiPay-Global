<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadiPay Global | منصة التوجيه الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <div class="logo">MadiPay <span>Global</span></div>
            <p class="subtitle">بوابة إدارة وتوجيه المدفوعات الدولية والمحلية بنظام التحليل الذكي</p>
        </header>

        <main>
            <!-- نموذج محاكاة الدفع الذكي -->
            <section class="payment-box">
                <h3>محاكاة معالجة مدفوعات ذكية (Vortex Routing)</h3>
                
                <div class="input-group">
                    <label for="amount">المبلغ المالي:</label>
                    <input type="number" id="amount" placeholder="0.00" required>
                </div>

                <div class="input-group">
                    <label for="currency">العملة المقبولة:</label>
                    <select id="currency">
                        <option value="DZD">الدينار الجزائري (DZD)</option>
                        <option value="USD">الدولار الأمريكي (USD)</option>
                        <option value="EUR">اليورو الأوروبي (EUR)</option>
                    </select>
                </div>

                <button id="processBtn" onclick="processSimulation()">تشغيل التوجيه الصارم</button>
            </section>

            <!-- شاشة عرض النتائج الفورية -->
            <section id="resultBox" class="result-box hidden">
                <h4>تقرير حالة المعاملة الفورية</h4>
                <div class="receipt-line">المعرف الرقمي: <span id="resTxn" class="neon-text"></span></div>
                <div class="receipt-line">البوابة الموجه إليها: <span id="resGateway"></span></div>
                <div class="receipt-line">الرسوم المستقطعة: <span id="resFee"></span></div>
                <div class="receipt-line">الإجمالي الكلي: <span id="resTotal" class="emerald-text"></span></div>
            </section>
        </main>

        <footer>
            <p>© 2026 MadiPay Global. جميع الحقوق محفوظة لبروتوكول السيادة المشفر.</p>
        </footer>
    </div>

    <script>
        // دالة المحاكاة لربط الواجهة بالمنطق البرمي
        function processSimulation() {
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            
            if(!amount || amount <= 0) {
                alert('الرجاء إدخال مبلغ صحيح لبدء الفحص الصارم.');
                return;
            }

            // محاكاة معالجة الـ Smart Router
            let gateway = "";
            let feeRate = 0;

            if(currency === 'DZD') {
                gateway = "Local_Gateway_Vortex (الدفع المحلي)";
                feeRate = 0.01;
            } else if (currency === 'USD' && amount >= 1000) {
                gateway = "International_Liquidity_A (سيولة دولية متقدمة)";
                feeRate = 0.02;
            } else {
                gateway = "Stripe_Global_Route (التوجيه الدولي القياسي)";
                feeRate = 0.035;
            }

            const fee = amount * feeRate;
            const total = amount + fee;

            // عرض النتيجة على واجهة الجلاسمورفيزم
            document.getElementById('resTxn').innerText = 'TXN-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('resGateway').innerText = gateway;
            document.getElementById('resFee').innerText = fee.toFixed(2) + ' ' + currency;
            document.getElementById('resTotal').innerText = total.toFixed(2) + ' ' + currency;

            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
