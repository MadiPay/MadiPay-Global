<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadiPay Global - Smart Router</title>
    <!-- تضمين مكتبة Tailwind CSS للمطورين -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تخصيص تأثير الزجاج (Glassmorphism) يدوياً لضمان أعلى جودة */
        .glass-panel {
            background: rgba(26, 26, 26, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 102, 0, 0.15);
        }
        /* تأثير وهج النيون البرتقالي */
        .neon-glow {
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.2);
        }
    </style>
</head>
<!-- الخلفية باللون الفحمي الداكن جداً الشبيه بأنظمة النخبة -->
<body class="bg-[#0d0d0d] text-gray-200 font-sans min-h-screen flex flex-col justify-between">

    <!-- شريط القيادة العلوي (Header) -->
    <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-[#ff6600]/20">
        <div class="flex items-center space-x-3">
            <!-- الهوية البصرية: نيون برتقالي -->
            <div class="w-3 h-3 bg-[#ff6600] rounded-full animate-pulse shadow-[0_0_8px_#ff6600]"></div>
            <span class="text-xl font-bold tracking-wider uppercase text-white">MadiPay <span class="text-[#ff6600]">Global</span></span>
        </div>
        <nav class="hidden md:flex space-x-6 text-sm font-medium">
            <a href="#" class="text-[#ff6600] hover:text-white transition">Smart Router</a>
            <a href="#" class="hover:text-[#ff6600] transition">Escrow</a>
            <a href="#" class="hover:text-[#ff6600] transition">Security</a>
        </nav>
    </header>

    <!-- القسم الرئيسي للمنصة -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
        <div class="max-w-xl w-full glass-panel neon-glow rounded-2xl p-8 text-center space-y-6">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">
                The Sovereign <span class="text-[#ff6600]">Financial Architecture</span>
            </h1>
            <p class="text-gray-400 text-sm leading-relaxed">
                Advanced open-source routing protocol designed to secure and optimize cross-border flows, bridging local infrastructures with global payment networks.
            </p>
            
            <!-- زر تفاعلي تجريبي -->
            <button class="w-full bg-[#ff6600] hover:bg-[#e05900] text-black font-bold uppercase tracking-wider py-3 px-6 rounded-lg transition-all duration-300 shadow-[0_4px_14px_rgba(255,102,0,0.4)]">
                Initialize Secure Router
            </button>
        </div>
    </main>

    <!-- التذييل السفلي (Footer) -->
    <footer class="text-center py-6 text-xs text-gray-600 border-t border-gray-900">
        © 2026 MadiPay Global Systems. All ironclad rights reserved.
    </footer>

</body>
</html>
