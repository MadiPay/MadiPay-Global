<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MadiPay Global | Smart Financial Routing Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="brand-wrapper">
                <div class="logo-orb"></div>
                <h1 class="brand-title">MadiPay <span class="text-gradient">Global</span></h1>
            </div>
            <div class="status-badge">
                <span class="pulse-icon"></span> Secure Node
            </div>
        </header>

        <section class="balance-card">
            <p class="card-label">AVAILABLE LIQUIDITY</p>
            <h2 class="card-balance">$1,250.00 <span class="currency-tag">USD</span></h2>
            <div class="card-footer">
                <span>Account: VORTEX_LIVE_USER_88</span>
            </div>
        </section>

        <main class="routing-engine-wrapper">
            <h3 class="section-title">Smart Routing Gateway</h3>
            <form id="transactionForm" class="routing-form">
                
                <div class="input-group">
                    <label for="accountDetails">Destination Account / Utility ID</label>
                    <input type="text" id="accountDetails" placeholder="e.g., UTILITY_SYS_ALGERIA" required>
                </div>

                <div class="input-group">
                    <label for="gateway">Routing Channel</label>
                    <select id="gateway" required>
                        <option value="VORTEX_INTERNAL_ROUTER">MadiPay Vortex Smart Router (Optimal)</option>
                        <option value="PAYPAL_GATEWAY_SIM">International PayPal Bridge</option>
                        <option value="BINANCE_P2P_DECENTRALIZED">Decentralized Binance P2P Layer</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="amount">Volume Amount (USDT / Fiat Equivalent)</label>
                    <div class="amount-input-wrapper">
                        <input type="number" id="amount" step="0.01" placeholder="0.00" min="0.01" required>
                        <span class="input-currency-addon">USDT</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span>Execute Secure Route</span>
                    <div class="btn-glow"></div>
                </button>
            </form>
        </main>

        <div id="outputLedger" class="output-ledger hidden">
            </div>

    </div>

    <script src="src/js/app.js"></script>
</body>
</html>
